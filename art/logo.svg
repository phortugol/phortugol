<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <defs>
    <linearGradient id="badge-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="440" height="100" rx="14" fill="#0D0D1F"/>

  <!-- Left accent strip -->
  <rect x="0" y="0" width="4" height="100" rx="2" fill="url(#badge-grad)"/>

  <!-- Icon badge -->
  <rect x="16" y="14" width="72" height="72" rx="13" fill="url(#badge-grad)"/>

  <!-- >_ terminal symbol -->
  <text x="30" y="56"
        font-family="'SF Mono','Cascadia Code','Fira Code','Courier New',monospace"
        font-size="20" font-weight="700" fill="white">&gt;_</text>

  <!-- ph label inside badge -->
  <text x="34" y="74"
        font-family="'SF Mono','Cascadia Code','Fira Code','Courier New',monospace"
        font-size="10" fill="rgba(255,255,255,0.38)">ph</text>

  <!-- Wordmark -->
  <text x="104" y="59"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="36" font-weight="800" letter-spacing="-1">
    <tspan fill="#A78BFA">ph</tspan><tspan fill="#EEEEFF">ortugol</tspan>
  </text>

  <!-- Tagline -->
  <text x="105" y="79"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="12" fill="#3D3D5C" letter-spacing="0.5">
    Portugol interpreter · PHP 8.5
  </text>
</svg>
